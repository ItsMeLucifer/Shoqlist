name: shoqlist
description: A new Flutter project.
publish_to: "none"

version: 2.0.0+37

environment:
  sdk: ^3.10.4
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # UI
  syncfusion_flutter_barcodes: ^29.1.38
  liquid_pull_to_refresh: ^3.0.1
  flutter_slidable: ^4.0.0

  # Utilities
  nanoid: ^1.0.0
  intl: ^0.20.0
  connectivity_plus: ^7.1.1

  # Sharing (replaces deprecated `share`)
  share_plus: ^12.0.2

  # Barcode (replaces deprecated `flutter_barcode_scanner`)
  mobile_scanner: ^6.0.0

  # Ads
  google_mobile_ads: ^6.0.0

  # Local storage (Hive CE — maintained fork of unmaintained `hive`)
  hive_ce: ^2.11.3
  hive_ce_flutter: ^2.3.1

  # Auth
  google_sign_in: ^7.1.1

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  firebase_crashlytics: ^5.0.0

  collection: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_ce_generator: ^1.9.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  image_path: "images/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true

flutter_native_splash:
  color: "#ffffff"
  image: "images/icon.png"
  android: true
  ios: true
  android_12:
    color: "#ffffff"
    image: "images/icon.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - images/icon.png

  fonts:
    - family: Epilogue
      fonts:
        - asset: fonts/Epilogue/epilogue.regular.ttf
        - asset: fonts/Epilogue/epilogue.thin.ttf
          weight: 100
        - asset: fonts/Epilogue/epilogue.bold.ttf
          weight: 700
        - asset: fonts/Epilogue/epilogue.black.ttf
          weight: 900
